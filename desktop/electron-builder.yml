appId: com.okak.app
productName: ОКАК
copyright: Copyright © 2026

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

extraMetadata:
  main: dist/main.js

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: assets/icon.svg
  category: Office
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
