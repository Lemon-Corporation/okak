appId: com.okak.app
productName: OKAK
copyright: Copyright © 2026

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

extraResources:
  - from: ../frontend/.next/standalone
    to: frontend/.next/standalone
    filter:
      - "**/*"

extraMetadata:
  main: dist/main.js

mac:
  category: public.app-category.productivity
  icon: assets/icon.png
  executableName: OKAK
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: assets/icon.png
  category: Office
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
