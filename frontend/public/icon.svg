<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)" opacity="0.2"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="70" fill="#0038FF"/>
  
  <!-- OKAK letters - stylized -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, sans-serif" font-weight="900" font-size="48" fill="#BFFF00">
    OK
  </text>
  
  <!-- Second line AK -->
  <text x="100" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="white">
    AK
  </text>
  
  <!-- Voice wave indicators -->
  <path d="M175 100 Q185 95 185 100 Q185 105 175 100" stroke="#BFFF00" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M185 100 Q195 93 195 100 Q195 107 185 100" stroke="#BFFF00" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </path>
  
  <!-- Left wave -->
  <path d="M25 100 Q15 95 15 100 Q15 105 25 100" stroke="#BFFF00" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.7s"/>
  </path>
  <path d="M15 100 Q5 93 5 100 Q5 107 15 100" stroke="#BFFF00" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </path>
  
  <!-- Connection dots around -->
  <circle cx="100" cy="20" r="4" fill="#BFFF00">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="45" r="3" fill="#BFFF00" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="100" r="4" fill="#BFFF00">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="155" r="3" fill="#BFFF00" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="180" r="4" fill="#BFFF00">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="155" r="3" fill="#BFFF00" opacity="0.6">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="100" r="4" fill="#BFFF00">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="45" r="3" fill="#BFFF00" opacity="0.5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0038FF"/>
      <stop offset="100%" stop-color="#0038FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>