services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: okak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d okak"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    env_file:
      - .env
    environment:
      OKAK_POSTGRES__HOST: postgres
      OKAK_UPLOADS__UPLOADS_DIR: /app/uploads
    command: >
      sh -c "alembic upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
