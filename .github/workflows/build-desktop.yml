name: Build Desktop Apps

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Build desktop
        run: cd desktop && pnpm build

      - name: Build DMG
        run: cd desktop && npx electron-builder --mac dmg --publish never

      - name: Publish to okak-release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd desktop && npx electron-builder --mac dmg --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: OKAK-macos
          path: desktop/release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: cd frontend; pnpm build

      - name: Build desktop
        run: cd desktop; pnpm build

      - name: Generate self-signed certificate
        run: |
          cd desktop
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=OKAK"
          openssl pkcs12 -export -out cert.pfx -inkey key.pem -in cert.pem -password pass:okak123
          del key.pem cert.pem

      - name: Build signed NSIS
        run: cd desktop; npx electron-builder --win nsis --publish never
        env:
          CSC_LINK: cert.pfx
          CSC_KEY_PASSWORD: okak123

      - name: Sign with SignPath (if configured)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        run: |
          cd desktop/release
          for f in *.exe; do
            curl -X POST https://app.signpath.io/api/v1/${{ secrets.SIGNPATH_ORG_SLUG }}/SigningRequests \
              -H "Authorization: Bearer ${{ secrets.SIGNPATH_API_TOKEN }}" \
              -F "File=@$f" \
              -F "SigningPolicySlug=${{ secrets.SIGNPATH_POLICY_SLUG }}" \
              -o "$f.signed"
            mv "$f.signed" "$f"
          done
        continue-on-error: true

      - name: Publish to okak-release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd desktop; npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          CSC_LINK: cert.pfx
          CSC_KEY_PASSWORD: okak123

      - uses: actions/upload-artifact@v4
        with:
          name: OKAK-windows
          path: desktop/release/*.exe
