name: Build Desktop Apps

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Build desktop
        run: cd desktop && pnpm build

      - name: Build DMG
        run: cd desktop && npx electron-builder --mac dmg --publish never

      - name: Publish to okak-release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd desktop && npx electron-builder --mac dmg --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: OKAK-macos
          path: desktop/release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: cd frontend; pnpm build

      - name: Build desktop
        run: cd desktop; pnpm build

      - name: Build NSIS
        run: cd desktop; npx electron-builder --win nsis --publish never

      - name: Publish to okak-release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd desktop; npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: OKAK-windows
          path: desktop/release/*.exe
